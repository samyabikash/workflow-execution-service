server:
  port: 8080

spring:
  application:
    name: workflow-execution-service

logging:
  level:
    com.growthloops.workflow: INFO

workflow:
  demo:
    # 0 = honour each delay step's own durationMillis (production behaviour).
    # Activate the "demo" profile to override every delay with a long, fixed
    # value so RUNNING/CANCELLED states are easy to observe by hand.
    delay-millis: 0